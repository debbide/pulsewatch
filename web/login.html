<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="container">
    <div class="card" style="max-width: 420px; margin: 80px auto;">
      <h1>Admin Login</h1>
      <form id="login-form" class="row">
        <input type="password" id="password" placeholder="Admin Password" required />
        <button type="submit">Login</button>
      </form>
      <p id="error" style="color:#b91c1c;"></p>
    </div>
  </div>
  <script>
    const MSG_LOGIN_FAILED = 'Login failed'

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const password = document.getElementById('password').value
      const error = document.getElementById('error')
      error.textContent = ''

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      })

      const data = await res.json()
      if (!res.ok) {
        error.textContent = data.error || MSG_LOGIN_FAILED
        return
      }

      localStorage.setItem('admin_token', data.token)
      location.href = '/admin'
    })
  </script>
</body>
</html>
