<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Status - Pro Max</title>
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <div class="status-app">
    <!-- Sidebar -->
    <aside class="status-sidebar card">
      <div class="status-sidebar-head">
        <h2>Monitors</h2>
        <div class="status-head-right">
          <a href="/login" style="font-size: 0.85rem; font-weight: 600;">Control Node</a>
          <span id="refresh-countdown" class="refresh-chip">30s</span>
        </div>
      </div>

      <input id="monitor-search" class="status-search" placeholder="Search parameters..." autocomplete="off"
        spellcheck="false" />

      <div class="status-filter-row" id="status-filters">
        <button class="status-filter active" data-filter="all">ALL</button>
        <button class="status-filter" data-filter="up">ONLINE</button>
        <button class="status-filter" data-filter="down">OFFLINE</button>
        <button class="status-filter" data-filter="unknown">UNKNOWN</button>
      </div>

      <div id="monitor-list" class="status-list"></div>
    </aside>

    <!-- Main Content -->
    <main class="status-main">
      <section id="global-banner" class="card global-banner status-unknown">Initializing array...</section>

      <section class="card status-header">
        <div>
          <p class="status-eyebrow">Real-time Telemetry</p>
          <h1 id="selected-name">Awaiting Data</h1>
        </div>
        <div id="selected-pill" class="status-pill status-unknown">
          <span class="pill-dot"></span>
          <span id="selected-pill-text">SYNCING</span>
        </div>
      </section>

      <section class="status-kpi-grid dashboard-kpis">
        <article class="card status-kpi">
          <p>Ping Current</p>
          <h2 id="kpi-current">--<span style="font-size: 1rem; color: var(--text-tertiary);">ms</span></h2>
        </article>
        <article class="card status-kpi">
          <p>Ping Avg (24H)</p>
          <h2 id="kpi-avg24">--<span style="font-size: 1rem; color: var(--text-tertiary);">ms</span></h2>
        </article>
        <article class="card status-kpi">
          <p>Uptime (24H)</p>
          <h2 id="kpi-up24">--<span style="font-size: 1rem; color: var(--text-tertiary);">%</span></h2>
        </article>
        <article class="card status-kpi">
          <p>Uptime (30D)</p>
          <h2 id="kpi-up30">--<span style="font-size: 1rem; color: var(--text-tertiary);">%</span></h2>
        </article>
      </section>

      <section class="card status-history">
        <div class="status-section-head">
          <h3>Health Timeline</h3>
          <span id="refresh-time" class="status-meta"></span>
        </div>
        <div id="check-strip" class="check-strip"></div>
      </section>

      <section class="card chart-card">
        <div class="status-section-head">
          <h3>Response Vector</h3>
          <div class="status-range-controls" id="range-controls">
            <button class="status-range-btn" data-range="1h">1H</button>
            <button class="status-range-btn" data-range="6h">6H</button>
            <button class="status-range-btn active" data-range="24h">24H</button>
          </div>
        </div>
        <span id="chart-range" class="status-meta">Displaying 24H spectrum limits</span>
        <svg id="latency-chart" viewBox="0 0 1000 280" preserveAspectRatio="none" class="latency-chart"></svg>
        <div id="chart-tooltip" class="chart-tooltip" style="display:none;"></div>
      </section>

      <section class="card">
        <div class="status-section-head">
          <h3>Anomaly Logs</h3>
        </div>
        <div id="incident-list" class="incident-list"></div>
      </section>
    </main>
  </div>

  <script>
    let monitors = []
    let selectedId = null
    let selectedRange = '24h'
    let selectedStatusFilter = 'all'
    let refreshSeconds = 30

    function statusClass(status) {
      if (status === 'up') return 'status-up'
      if (status === 'down') return 'status-down'
      return 'status-unknown'
    }

    function statusLabel(status) {
      if (status === 'up') return 'ONLINE'
      if (status === 'down') return 'OFFLINE'
      return 'UNKNOWN'
    }

    function safeNumber(value, fallback = 0) {
      const n = Number(value)
      return Number.isFinite(n) ? n : fallback
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;')
    }

    function getFilteredChecks(checks) {
      const now = Date.now()
      const rangeToMs = {
        '1h': 60 * 60 * 1000,
        '6h': 6 * 60 * 60 * 1000,
        '24h': 24 * 60 * 60 * 1000
      }
      const limit = rangeToMs[selectedRange] || rangeToMs['24h']
      return checks.filter((item) => {
        const time = new Date(item.checked_at).getTime()
        return now - time <= limit
      })
    }

    function buildChartPath(points, width, height, maxValue) {
      if (!points.length) return ''

      // Use smooth curves instead of distinct lines
      let path = `M0 ${(height - (points[0] / Math.max(maxValue, 1)) * height).toFixed(2)}`

      for (let i = 1; i < points.length; i++) {
        const x = (i / Math.max(points.length - 1, 1)) * width
        const y = height - (points[i] / Math.max(maxValue, 1)) * height

        const prevX = ((i - 1) / Math.max(points.length - 1, 1)) * width
        const prevY = height - (points[i - 1] / Math.max(maxValue, 1)) * height

        // Cubic bezier to make lines smooth
        const cp1x = prevX + (x - prevX) * 0.5
        const cp1y = prevY
        const cp2x = prevX + (x - prevX) * 0.5
        const cp2y = y

        path += ` C${cp1x.toFixed(2)} ${cp1y.toFixed(2)}, ${cp2x.toFixed(2)} ${cp2y.toFixed(2)}, ${x.toFixed(2)} ${y.toFixed(2)}`
      }
      return path
    }

    function renderChart(checks) {
      const svg = document.getElementById('latency-chart')
      const tooltip = document.getElementById('chart-tooltip')
      const width = 1000 // Matched to viewBox
      const height = 280
      const padding = 20
      const innerHeight = height - padding * 2

      const latencies = checks.map((item) => safeNumber(item.response_time, 0))
      if (!latencies.length) {
        svg.innerHTML = ''
        tooltip.style.display = 'none'
        return
      }

      // Buffer max latency a bit so peak doesn't hit the very top
      const maxLatency = Math.max(...latencies, 100) * 1.1
      const path = buildChartPath(latencies, width, innerHeight, maxLatency)

      // Grid lines
      const horizontal = [0.25, 0.5, 0.75].map((ratio) => {
        const y = padding + Math.round(innerHeight * ratio)
        return `<line x1="0" y1="${y}" x2="${width}" y2="${y}" class="chart-grid" />`
      }).join('')

      const points = checks.map((item, index) => {
        const x = (index / Math.max(checks.length - 1, 1)) * width
        const y = padding + innerHeight - (safeNumber(item.response_time) / Math.max(maxLatency, 1)) * innerHeight
        return { x, y, item }
      })

      const circles = points.map((point, index) => {
        const isDown = point.item.status === 'down';
        return `<circle class="chart-point ${isDown ? 'is-down' : ''}" data-index="${index}" cx="${point.x.toFixed(2)}" cy="${point.y.toFixed(2)}" r="${isDown ? 5 : 3.5}"></circle>`
      }).join('')

      const areaPath = `${path} L ${width} ${padding + innerHeight} L 0 ${padding + innerHeight} Z`

      const defs = `<defs>
        <linearGradient id="chartGradient" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="rgba(0, 229, 255, 0.4)"/>
          <stop offset="100%" stop-color="rgba(0, 229, 255, 0.0)"/>
        </linearGradient>
      </defs>`

      // Wrap paths in group to apply top padding translation
      svg.innerHTML = `
        ${defs}
        ${horizontal}
        <g transform="translate(0, ${padding})">
          <path d="${areaPath}" class="chart-area" />
          <path d="${path}" class="chart-line" />
        </g>
        ${circles}
      `

      // Add interactivity
      const bounds = svg.getBoundingClientRect();

      svg.querySelectorAll('.chart-point').forEach((node) => {
        node.addEventListener('mouseenter', (event) => {
          const index = Number(event.target.getAttribute('data-index'))
          const point = points[index]
          if (!point) return

          tooltip.style.display = 'block'

          const timeStr = new Date(point.item.checked_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          const statusText = point.item.status === 'down' ? '<span style="color:var(--neon-red)">ERR</span>' : '<span style="color:var(--neon-green)">OK</span>'
          const safeLatency = escapeHtml(Math.round(safeNumber(point.item.response_time)))
          const safeTimeStr = escapeHtml(timeStr)

          tooltip.innerHTML = `<div style="text-align:center; color: var(--text-secondary); margin-bottom: 4px;">${safeTimeStr}</div>
                               <div style="font-size:1.1rem; color:#fff;">${safeLatency}ms | ${statusText}</div>`

          // Position relative to SVG container
          const ptRect = event.target.getBoundingClientRect();
          const svgRect = svg.getBoundingClientRect();

          tooltip.style.left = `${ptRect.left - svgRect.left + ptRect.width / 2}px`
          tooltip.style.top = `${ptRect.top - svgRect.top - 10}px`
        })
      })

      svg.addEventListener('mouseleave', () => {
        tooltip.style.display = 'none'
      })
    }

    function renderChecks(checks) {
      const strip = document.getElementById('check-strip')
      // Squeeze more checks since they are much thinner now
      strip.innerHTML = checks.slice(-180).map((item) => {
        const cls = item.status === 'up' ? 'ok' : item.status === 'down' ? 'bad' : 'na'
        const time = new Date(item.checked_at).toLocaleTimeString()
        const rt = safeNumber(item.response_time)
        return `<span class="check-cell ${cls}" title="${escapeHtml(time)} | ${escapeHtml(item.status.toUpperCase())} | ${escapeHtml(Math.round(rt))}ms"></span>`
      }).join('')
    }

    function updateKpis(monitor) {
      document.getElementById('kpi-current').innerHTML = `${Math.round(safeNumber(monitor.response_time))}<span style="font-size: 1rem; color: var(--text-tertiary);">ms</span>`
      document.getElementById('kpi-avg24').innerHTML = `${Math.round(safeNumber(monitor.avg_response_24h))}<span style="font-size: 1rem; color: var(--text-tertiary);">ms</span>`
      document.getElementById('kpi-up24').innerHTML = `${safeNumber(monitor.uptime_24h).toFixed(2)}<span style="font-size: 1rem; color: var(--text-tertiary);">%</span>`
      document.getElementById('kpi-up30').innerHTML = `${safeNumber(monitor.uptime_30d).toFixed(2)}<span style="font-size: 1rem; color: var(--text-tertiary);">%</span>`
    }

    function renderSelected(monitor) {
      if (!monitor) return
      document.getElementById('selected-name').textContent = monitor.name
      const pill = document.getElementById('selected-pill')
      pill.className = `status-pill ${statusClass(monitor.status)}`
      document.getElementById('selected-pill-text').textContent = statusLabel(monitor.status)
      document.getElementById('refresh-time').textContent = `Sync: ${new Date().toLocaleTimeString()}`

      const checks = getFilteredChecks(monitor.checks || [])
      renderChecks(checks)
      renderChart(checks)
      updateKpis(monitor)
      document.getElementById('chart-range').textContent = `Spectrum vector limits: ${selectedRange.toUpperCase()}`
    }

    function updateGlobalBanner() {
      const banner = document.getElementById('global-banner')
      if (!monitors.length) {
        banner.className = 'card global-banner status-unknown'
        banner.innerHTML = 'Awaiting nodes calibration...'
        return
      }

      const down = monitors.filter((item) => item.status === 'down').length
      const unknown = monitors.filter((item) => item.status === 'unknown').length

      if (down > 0) {
        banner.className = 'card global-banner status-down'
        banner.innerHTML = `CRITICAL: ${down} node(s) unresponsive.`
        return
      }
      if (unknown > 0) {
        banner.className = 'card global-banner status-unknown'
        banner.innerHTML = `DISCOVERY: ${unknown} node(s) initializing...`
        return
      }

      banner.className = 'card global-banner status-up'
      banner.innerHTML = 'ALL SYSTEMS OPERATIONAL. NO ANOMALIES DETECTED.'
    }

    function formatDuration(seconds) {
      const value = safeNumber(seconds, 0)
      if (value < 60) return `${value}s`
      if (value < 3600) return `${Math.floor(value / 60)}m ${value % 60}s`
      const hours = Math.floor(value / 3600)
      const minutes = Math.floor((value % 3600) / 60)
      return `${hours}h ${minutes}m`
    }

    function renderIncidents(incidents) {
      const container = document.getElementById('incident-list')
      if (!incidents.length) {
        container.innerHTML = '<p class="status-meta" style="padding: 16px;">Telemetry clean. No recent anomalies.</p>'
        return
      }

      container.innerHTML = incidents.map((item) => {
        const isOngoing = item.status === 'ongoing'
        const badgeClass = isOngoing ? 'status-down' : 'status-up'
        const badgeText = isOngoing ? 'ACTIVE' : 'RESOLVED'
        const started = new Date(item.started_at).toLocaleString([], { hour12: false })
        const resolved = item.resolved_at ? new Date(item.resolved_at).toLocaleString([], { hour12: false }) : '--'

        return `<article class="incident-item ${isOngoing ? 'ongoing' : ''}">
          <div class="incident-title-row">
            <strong>${escapeHtml(item.monitor_name)}</strong>
            <span class="incident-badge ${badgeClass}">${badgeText}</span>
          </div>
          <p class="incident-meta">INITIATED: <span>${escapeHtml(started)}</span></p>
          <p class="incident-meta">RESOLVED: <span>${escapeHtml(resolved)}</span></p>
          <p class="incident-meta">DURATION: <span>${escapeHtml(isOngoing ? 'CALCULATING...' : formatDuration(item.duration_seconds))}</span></p>
        </article>`
      }).join('')
    }

    function renderList() {
      const searchText = document.getElementById('monitor-search').value.trim().toLowerCase()
      const list = document.getElementById('monitor-list')
      const filtered = monitors.filter((item) => {
        const searchMatch = item.name.toLowerCase().includes(searchText)
        const statusMatch = selectedStatusFilter === 'all' || item.status === selectedStatusFilter
        return searchMatch && statusMatch
      })

      const groups = ['http', 'tcp', 'https_cert']
      const groupLabelMap = {
        http: 'HTTP',
        tcp: 'TCP',
        https_cert: 'HTTPS CERT'
      }
      list.innerHTML = groups.map((group) => {
        const items = filtered.filter((item) => item.check_type === group)
        if (!items.length) return ''
        const groupLabel = groupLabelMap[group] || group.toUpperCase()
        const downCount = items.filter((item) => item.status === 'down').length
        const badge = downCount > 0 ? `<span class="group-badge">${downCount}</span>` : ''

        const rows = items.map((item) => {
          const active = item.id === selectedId ? 'active' : ''
          return `<div class="monitor-item ${active}" data-id="${escapeHtml(item.id)}">
            <span class="monitor-name">${escapeHtml(item.name)}</span>
            <span class="monitor-meta ${statusClass(item.status)}">${statusLabel(item.status)}</span>
          </div>`
        }).join('')

        return `<section class="monitor-group"><h4>${groupLabel} ${badge}</h4>${rows}</section>`
      }).join('')

      list.querySelectorAll('.monitor-item').forEach((el) => {
        el.addEventListener('click', () => {
          selectedId = el.getAttribute('data-id')
          renderList()
          const selected = monitors.find((m) => m.id === selectedId)
          renderSelected(selected)
        })
      })
    }

    async function loadAll() {
      try {
        const [statusData, incidentData] = await Promise.all([
          fetch('/api/public/status').then((r) => r.json()),
          fetch('/api/public/incidents').then((r) => r.json())
        ])

        const data = statusData
        monitors = Array.isArray(data) ? data : []
        renderIncidents(Array.isArray(incidentData) ? incidentData : [])
        updateGlobalBanner()

        if (!monitors.length) {
          document.getElementById('selected-name').textContent = 'No Nodes Found'
          return
        }

        if (!selectedId || !monitors.some((item) => item.id === selectedId)) {
          const bad = monitors.find((item) => item.status === 'down')
          selectedId = (bad || monitors[0]).id
        }

        renderList()
        const selected = monitors.find((item) => item.id === selectedId)
        renderSelected(selected)
      } catch (e) {
        console.error('Telemetry Sync Error:', e)
      }
    }

    function updateCountdownChip() {
      const chip = document.getElementById('refresh-countdown')
      chip.textContent = `T-${refreshSeconds}s`
    }

    setInterval(() => {
      refreshSeconds -= 1
      if (refreshSeconds <= 0) {
        refreshSeconds = 30
      }
      updateCountdownChip()
    }, 1000)

    document.getElementById('monitor-search').addEventListener('input', renderList)

    document.getElementById('range-controls').addEventListener('click', (event) => {
      const button = event.target.closest('.status-range-btn')
      if (!button) return
      selectedRange = button.getAttribute('data-range') || '24h'
      document.querySelectorAll('.status-range-btn').forEach((node) => node.classList.remove('active'))
      button.classList.add('active')
      const selected = monitors.find((item) => item.id === selectedId)
      renderSelected(selected)
    })

    document.getElementById('status-filters').addEventListener('click', (event) => {
      const button = event.target.closest('.status-filter')
      if (!button) return
      selectedStatusFilter = button.getAttribute('data-filter') || 'all'
      document.querySelectorAll('.status-filter').forEach((node) => node.classList.remove('active'))
      button.classList.add('active')
      renderList()
    })

    loadAll()
    setInterval(() => {
      refreshSeconds = 30
      updateCountdownChip()
      loadAll()
    }, 30000)
    updateCountdownChip()
  </script>
</body>

</html>
