<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="container">
    <div class="topbar">
      <h1 id="page-title"></h1>
      <div class="topbar-actions">
        <div class="topbar-primary-actions">
          <button id="open-create-modal-btn"></button>
          <button class="secondary" id="open-config-modal-btn"></button>
          <button class="secondary" id="open-password-modal-btn"></button>
        </div>
        <div class="topbar-secondary-actions">
          <a href="/status" id="link-status" class="secondary topbar-link-btn" target="_blank" rel="noopener noreferrer"></a>
          <button class="secondary" id="logout-btn"></button>
        </div>
      </div>
    </div>

    <div id="monitor-form-modal" class="modal-shell is-hidden">
      <div class="modal-mask" id="close-monitor-modal-mask"></div>
      <div class="card modal-panel">
        <div class="modal-head">
          <h3 id="form-title"></h3>
          <button type="button" class="secondary modal-close" id="close-monitor-modal-btn">×</button>
        </div>
        <form id="monitor-form">
        <div class="row">
          <input id="name" required />
          <input id="public_name" />
          <input id="url" required />
        </div>

        <div class="row" style="margin-top:8px;">
          <select id="check_type">
            <option value="http">HTTP</option>
            <option value="tcp">TCP</option>
            <option value="https_cert">HTTPS Cert</option>
          </select>
          <select id="check_method">
            <option value="GET">GET</option>
            <option value="HEAD">HEAD</option>
            <option value="POST">POST</option>
          </select>
          <div>
            <label for="check_interval_mode" id="label-interval-mode" style="display:block;font-size:12px;margin-bottom:4px;color:#94a3b8;"></label>
            <select id="check_interval_mode">
              <option value="fixed" id="interval-fixed-opt"></option>
              <option value="range" id="interval-range-opt"></option>
            </select>
          </div>
          <div id="interval-fixed-wrap">
            <label for="check_interval" id="label-interval-fixed" style="display:block;font-size:12px;margin-bottom:4px;color:#94a3b8;"></label>
            <input id="check_interval" type="number" min="1" max="60" value="5" />
          </div>
          <div id="interval-range-wrap" style="display:none;">
            <label id="label-interval-range" style="display:block;font-size:12px;margin-bottom:4px;color:#94a3b8;"></label>
            <div class="row" style="gap:6px;">
              <input id="check_interval_min" type="number" min="1" max="60" value="5" />
              <input id="check_interval_max" type="number" min="1" max="60" value="10" />
            </div>
          </div>
          <div>
            <label for="check_timeout" id="label-timeout" style="display:block;font-size:12px;margin-bottom:4px;color:#94a3b8;"></label>
            <input id="check_timeout" type="number" min="5" max="120" value="30" />
          </div>
          <div>
            <label for="cert_expiry_days" id="label-cert-expiry" style="display:block;font-size:12px;margin-bottom:4px;color:#94a3b8;"></label>
            <input id="cert_expiry_days" type="number" min="1" max="365" value="15" />
          </div>
        </div>

        <div class="row" style="margin-top:8px;">
          <label style="display:flex;align-items:center;gap:8px;min-width:220px;">
            <input id="toggle-advanced" type="checkbox" />
            <span id="text-advanced-toggle"></span>
          </label>
        </div>

        <div id="advanced-fields" style="display:none;">
          <div class="row" style="margin-top:8px;">
            <input id="expected_status_codes" value="200,201,204,301,302" />
            <input id="expected_keyword" />
            <input id="forbidden_keyword" />
          </div>
        </div>

        <div class="row" style="margin-top:8px;">
          <select id="is_public">
            <option value="1" id="public-on"></option>
            <option value="0" id="public-off"></option>
          </select>
          <select id="is_active">
            <option value="1" id="active-on"></option>
            <option value="0" id="active-off"></option>
          </select>
        </div>

        <div class="row" style="margin-top:8px;">
          <label style="display:flex;align-items:center;gap:8px;min-width:220px;">
            <input id="enable-webhook" type="checkbox" />
            <span id="text-webhook-toggle"></span>
          </label>
        </div>

        <div id="webhook-fields" style="display:none;">
          <div class="row" style="margin-top:8px;">
            <input id="webhook_url" />
            <input id="webhook_content_type" value="application/json" />
            <input id="webhook_username" />
          </div>
          <div class="row" style="margin-top:8px;">
            <input id="webhook_headers" />
          </div>
          <div class="row" style="margin-top:8px;">
            <input id="webhook_body" />
          </div>
        </div>

          <div class="row" style="margin-top:12px;">
            <button type="submit" id="save-btn"></button>
            <button type="button" class="secondary" id="cancel-edit-btn" style="display:none;"></button>
          </div>
        </form>
      </div>
    </div>

    <div class="monitor-split">
      <div class="card monitor-board">
        <div class="monitor-list-head">
          <h3 id="monitor-list-title"></h3>
          <p id="monitor-list-hint" class="status-meta"></p>
        </div>
        <div id="monitor-card-list" class="monitor-card-list"></div>
      </div>

      <div class="card monitor-detail-card">
        <h3 id="detail-title"></h3>
        <div id="detail-box"></div>
        <div id="detail-actions" class="actions-row detail-actions"></div>
        <div id="checks-box"></div>
      </div>
    </div>

    <div id="config-modal" class="modal-shell is-hidden">
      <div class="modal-mask" id="close-config-modal-mask"></div>
      <div class="card modal-panel">
        <div class="modal-head">
          <h3 id="cfg-title"></h3>
          <button type="button" class="secondary modal-close" id="close-config-modal-btn">×</button>
        </div>
        <div id="config-file" style="font-size:12px;color:#94a3b8;margin-bottom:8px;"></div>
        <form id="config-form">
          <div class="row">
            <div>
              <label for="cfg_port" id="cfg-port-label" style="display:block;font-size:12px;margin-bottom:4px;color:#94a3b8;"></label>
              <input id="cfg_port" type="number" min="1" max="65535" />
            </div>
            <div>
              <label for="cfg_db_path" id="cfg-db-label" style="display:block;font-size:12px;margin-bottom:4px;color:#94a3b8;"></label>
              <input id="cfg_db_path" type="text" />
            </div>
          </div>
          <div class="row" style="margin-top:8px;">
            <div>
              <label for="cfg_jwt" id="cfg-jwt-label" style="display:block;font-size:12px;margin-bottom:4px;color:#94a3b8;"></label>
              <input id="cfg_jwt" type="text" />
            </div>
            <div>
              <label for="cfg_admin_init" id="cfg-admin-label" style="display:block;font-size:12px;margin-bottom:4px;color:#94a3b8;"></label>
              <input id="cfg_admin_init" type="text" />
            </div>
          </div>
          <div class="row" style="margin-top:8px;">
            <div>
              <label for="cfg_concurrency" id="cfg-concurrency-label" style="display:block;font-size:12px;margin-bottom:4px;color:#94a3b8;"></label>
              <input id="cfg_concurrency" type="number" min="1" max="100" />
            </div>
            <div>
              <label for="cfg_default_timeout" id="cfg-timeout-label" style="display:block;font-size:12px;margin-bottom:4px;color:#94a3b8;"></label>
              <input id="cfg_default_timeout" type="number" min="5" max="120" />
            </div>
          </div>
          <div class="row" style="margin-top:8px;">
            <div>
              <label for="cfg_binary_url" id="cfg-binary-url-label" style="display:block;font-size:12px;margin-bottom:4px;color:#94a3b8;"></label>
              <input id="cfg_binary_url" type="text" />
            </div>
          </div>
          <div class="row" style="margin-top:8px;">
            <div>
              <label for="cfg_binary_path" id="cfg-binary-path-label" style="display:block;font-size:12px;margin-bottom:4px;color:#94a3b8;"></label>
              <input id="cfg_binary_path" type="text" />
            </div>
            <div>
              <label for="cfg_binary_port" id="cfg-binary-port-label" style="display:block;font-size:12px;margin-bottom:4px;color:#94a3b8;"></label>
              <input id="cfg_binary_port" type="number" min="1" max="65535" />
            </div>
          </div>
          <div class="row" style="margin-top:8px;">
            <div>
              <label for="cfg_binary_autostart" id="cfg-binary-autostart-label" style="display:block;font-size:12px;margin-bottom:4px;color:#94a3b8;"></label>
              <select id="cfg_binary_autostart">
                <option value="1" id="cfg-binary-autostart-on"></option>
                <option value="0" id="cfg-binary-autostart-off"></option>
              </select>
            </div>
          </div>
          <div class="row" style="margin-top:8px;">
            <button type="button" class="secondary" id="cfg-binary-status-btn"></button>
            <button type="button" class="secondary" id="cfg-binary-start-btn"></button>
            <button type="button" class="danger" id="cfg-binary-stop-btn"></button>
          </div>
          <div id="cfg-binary-status" style="font-size:12px;color:#94a3b8;margin-top:6px;"></div>
          <div class="row" style="margin-top:12px;">
            <button type="submit" id="cfg-save-btn"></button>
          </div>
        </form>
      </div>
    </div>

    <div id="password-modal" class="modal-shell is-hidden">
      <div class="modal-mask" id="close-password-modal-mask"></div>
      <div class="card modal-panel">
        <div class="modal-head">
          <h3 id="pwd-title"></h3>
          <button type="button" class="secondary modal-close" id="close-password-modal-btn">×</button>
        </div>
        <form id="pwd-form">
          <div class="row">
            <input id="new_password" type="password" required />
            <button type="submit" id="pwd-save-btn"></button>
          </div>
        </form>
      </div>
    </div>
  </div>

    function t(key) {
      return ZH[key] || key
    }

    function setText(id, key) {
      const el = document.getElementById(id)
      if (el) el.textContent = t(key)
    }

    function setPlaceholder(id, key) {
      const el = document.getElementById(id)
      if (el) el.placeholder = t(key)
    }

    const token = localStorage.getItem('admin_token')
    if (!token) location.href = '/login'

    let monitorsCache = []
    let editingId = null
    let selectedMonitorId = null

    function authFetch(url, options = {}) {
      return fetch(url, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${token}`,
          ...(options.headers || {})
        }
      })
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;')
    }

    function escapeAttr(value) {
      return escapeHtml(value)
    }

    function openModal(modalId) {
      const modal = document.getElementById(modalId)
      if (!modal) return
      modal.classList.remove('is-hidden')
      document.body.style.overflow = 'hidden'
    }

    function closeModal(modalId) {
      const modal = document.getElementById(modalId)
      if (!modal) return
      modal.classList.add('is-hidden')
      if (document.querySelectorAll('.modal-shell:not(.is-hidden)').length === 0) {
        document.body.style.overflow = ''
      }
    }

    function openMonitorModal() {
      openModal('monitor-form-modal')
    }

    function closeMonitorModal() {
      closeModal('monitor-form-modal')
    }

    async function openConfigModal() {
      await loadSystemConfig()
      openModal('config-modal')
    }

    function closeConfigModal() {
      closeModal('config-modal')
    }

    function openPasswordModal() {
      const next = document.getElementById('new_password')
      if (next) next.value = ''
      openModal('password-modal')
    }

    function closePasswordModal() {
      closeModal('password-modal')
    }

    function closeAllModals() {
      closeModal('monitor-form-modal')
      closeModal('config-modal')
      closeModal('password-modal')
      document.body.style.overflow = ''
    }

    function readFormPayload() {
      const enableWebhook = document.getElementById('enable-webhook').checked
      const intervalMode = document.getElementById('check_interval_mode').value
      return {
        name: document.getElementById('name').value.trim(),
        public_name: document.getElementById('public_name').value.trim() || null,
        url: document.getElementById('url').value.trim(),
        check_type: document.getElementById('check_type').value,
        check_method: document.getElementById('check_method').value,
        check_interval_mode: intervalMode,
        check_interval: Number(document.getElementById('check_interval').value),
        check_interval_min: Number(document.getElementById('check_interval_min').value),
        check_interval_max: Number(document.getElementById('check_interval_max').value),
        check_timeout: Number(document.getElementById('check_timeout').value),
        cert_expiry_days: Number(document.getElementById('cert_expiry_days').value),
        expected_status_codes: document.getElementById('expected_status_codes').value.trim(),
        expected_keyword: document.getElementById('expected_keyword').value.trim() || null,
        forbidden_keyword: document.getElementById('forbidden_keyword').value.trim() || null,
        is_public: Number(document.getElementById('is_public').value),
        is_active: Number(document.getElementById('is_active').value),
        webhook_url: enableWebhook ? (document.getElementById('webhook_url').value.trim() || null) : null,
        webhook_content_type: enableWebhook ? (document.getElementById('webhook_content_type').value.trim() || 'application/json') : 'application/json',
        webhook_username: enableWebhook ? (document.getElementById('webhook_username').value.trim() || null) : null,
        webhook_headers: enableWebhook ? (document.getElementById('webhook_headers').value.trim() || null) : null,
        webhook_body: enableWebhook ? (document.getElementById('webhook_body').value.trim() || null) : null
      }
    }

    function fillForm(item) {
      document.getElementById('name').value = item.name || ''
      document.getElementById('public_name').value = item.public_name || ''
      document.getElementById('url').value = item.url || ''
      document.getElementById('check_type').value = item.check_type || 'http'
      document.getElementById('check_method').value = item.check_method || 'GET'
      document.getElementById('check_interval_mode').value = item.check_interval_mode || 'fixed'
      document.getElementById('check_interval').value = item.check_interval || 5
      document.getElementById('check_interval_min').value = item.check_interval_min || 5
      document.getElementById('check_interval_max').value = item.check_interval_max || 10
      document.getElementById('check_timeout').value = item.check_timeout || 30
      document.getElementById('cert_expiry_days').value = item.cert_expiry_days || 15
      document.getElementById('expected_status_codes').value = item.expected_status_codes || '200,201,204,301,302'
      document.getElementById('expected_keyword').value = item.expected_keyword || ''
      document.getElementById('forbidden_keyword').value = item.forbidden_keyword || ''
      document.getElementById('is_public').value = Number(item.is_public || 0)
      document.getElementById('is_active').value = Number(item.is_active || 0)
      document.getElementById('webhook_url').value = item.webhook_url || ''
      document.getElementById('webhook_content_type').value = item.webhook_content_type || 'application/json'
      document.getElementById('webhook_username').value = item.webhook_username || ''
      document.getElementById('webhook_headers').value = item.webhook_headers || ''
      document.getElementById('webhook_body').value = item.webhook_body || ''

      const enabled = !!(item.webhook_url || item.webhook_headers || item.webhook_body || item.webhook_username)
      document.getElementById('enable-webhook').checked = enabled
      document.getElementById('webhook-fields').style.display = enabled ? '' : 'none'
      applyIntervalModeUI()
    }

    function resetForm() {
      editingId = null
      document.getElementById('monitor-form').reset()
      document.getElementById('check_interval_mode').value = 'fixed'
      document.getElementById('check_interval').value = 5
      document.getElementById('check_interval_min').value = 5
      document.getElementById('check_interval_max').value = 10
      document.getElementById('check_timeout').value = 30
      document.getElementById('cert_expiry_days').value = 15
      document.getElementById('expected_status_codes').value = '200,201,204,301,302'
      document.getElementById('webhook_content_type').value = 'application/json'
      document.getElementById('toggle-advanced').checked = false
      document.getElementById('advanced-fields').style.display = 'none'
      document.getElementById('enable-webhook').checked = false
      document.getElementById('webhook-fields').style.display = 'none'
      document.getElementById('form-title').textContent = t('formCreateTitle')
      document.getElementById('save-btn').textContent = t('create')
      document.getElementById('cancel-edit-btn').style.display = 'none'
      applyIntervalModeUI()
    }

    function startCreateMonitor() {
      resetForm()
      openMonitorModal()
    }

    function applyIntervalModeUI() {
      const mode = document.getElementById('check_interval_mode').value
      document.getElementById('interval-fixed-wrap').style.display = mode === 'range' ? 'none' : ''
      document.getElementById('interval-range-wrap').style.display = mode === 'range' ? '' : 'none'
    }

    function monitorIntervalLabel(item) {
      return item.check_interval_mode === 'range'
        ? `${item.check_interval_min}-${item.check_interval_max}m`
        : `${item.check_interval}m`
    }

    function monitorStatusKey(item) {
      if (!item.is_active) return 'statusPaused'
      if (item.status === 'up') return 'statusUp'
      if (item.status === 'down') return 'statusDown'
      return 'statusUnknown'
    }

    function monitorStatusClass(item) {
      if (!item.is_active) return 'paused'
      if (item.status === 'up') return 'up'
      if (item.status === 'down') return 'down'
      return 'unknown'
    }

    function monitorLastChecked(item) {
      const raw = item.last_checked_at || item.last_check_at || item.checked_at
      if (!raw) return t('notChecked')
      const date = new Date(raw)
      if (Number.isNaN(date.getTime())) return t('notChecked')
      return date.toLocaleString()
    }

    function uptimeLevel(value) {
      const number = Number(value)
      if (!Number.isFinite(number)) return 'unknown'
      if (number >= 99.9) return 'good'
      if (number >= 95) return 'warn'
      return 'bad'
    }

    function latencyLevel(value) {
      const number = Number(value)
      if (!Number.isFinite(number)) return 'unknown'
      if (number <= 400) return 'good'
      if (number <= 1200) return 'warn'
      return 'bad'
    }

    function renderMonitorCards() {
      const container = document.getElementById('monitor-card-list')
      if (!monitorsCache.length) {
        container.innerHTML = `<p class="status-meta">${escapeHtml(t('noMonitors'))}</p>`
        return
      }

      container.innerHTML = monitorsCache.map((item) => {
        const isSelected = item.id === selectedMonitorId
        const selectedClass = isSelected ? 'selected' : ''
        return `<button class="monitor-card-item ${selectedClass}" data-id="${escapeAttr(item.id)}" type="button">
          <div class="monitor-card-main">
            <strong>${escapeHtml(item.name)}</strong>
            <span class="status-meta">${escapeHtml(item.url)}</span>
          </div>
          <div class="monitor-card-status ${monitorStatusClass(item)}">
            <span class="status-dot"></span>
            <span>${escapeHtml(t(monitorStatusKey(item)))}</span>
            <span class="status-meta">${escapeHtml(t('lastChecked'))}: ${escapeHtml(monitorLastChecked(item))}</span>
          </div>
          <div class="monitor-card-tags">
            <span class="monitor-tag">${escapeHtml(item.check_type)}</span>
            <span class="monitor-tag">${escapeHtml(monitorIntervalLabel(item))}</span>
            <span class="monitor-tag">${item.is_public ? t('yes') : t('no')}</span>
            <span class="monitor-tag">${item.is_active ? t('activeOn') : t('activeOff')}</span>
          </div>
        </button>`
      }).join('')

      container.querySelectorAll('.monitor-card-item').forEach((node) => {
        node.addEventListener('click', async () => {
          selectedMonitorId = node.getAttribute('data-id')
          renderMonitorCards()
          await viewDetails(selectedMonitorId)
        })
      })
    }

    async function loadMonitors() {
      const res = await authFetch('/api/admin/monitors')
      if (res.status === 401) {
        localStorage.removeItem('admin_token')
        location.href = '/login'
        return
      }

      const list = await res.json()
      monitorsCache = list

      if (!monitorsCache.length) {
        selectedMonitorId = null
        renderMonitorCards()
        document.getElementById('detail-box').textContent = t('detailHint')
        document.getElementById('detail-actions').innerHTML = ''
        document.getElementById('checks-box').innerHTML = ''
        return
      }

      if (!selectedMonitorId || !monitorsCache.some((item) => item.id === selectedMonitorId)) {
        selectedMonitorId = monitorsCache[0].id
      }

      renderMonitorCards()
      await viewDetails(selectedMonitorId)
    }

    async function checkNow(id) {
      const res = await authFetch(`/api/admin/monitors/${id}/check-now`, { method: 'POST' })
      if (!res.ok) {
        const data = await res.json().catch(() => ({}))
        alert(data.error || t('triggerFailed'))
        return
      }
      alert(t('triggered'))
      selectedMonitorId = id
      await loadMonitors()
    }

    async function testWebhook(id) {
      const res = await authFetch('/api/admin/test-webhook', {
        method: 'POST',
        body: JSON.stringify({ monitor_id: id })
      })
      const data = await res.json().catch(() => ({}))
      if (!res.ok) {
        alert(data.error || t('webhookTestFailed'))
        return
      }
      alert(data.message || t('webhookSent'))
    }

    function editMonitor(id) {
      const item = monitorsCache.find((m) => m.id === id)
      if (!item) return
      editingId = id
      selectedMonitorId = id
      fillForm(item)
      document.getElementById('form-title').textContent = `${t('formEditTitle')}: ${item.name}`
      document.getElementById('save-btn').textContent = t('save')
      document.getElementById('cancel-edit-btn').style.display = ''
      renderMonitorCards()
      openMonitorModal()
    }

    async function removeMonitor(id) {
      if (!confirm(t('confirmDelete'))) return
      await authFetch(`/api/admin/monitors/${id}`, { method: 'DELETE' })
      if (selectedMonitorId === id) {
        selectedMonitorId = null
      }
      await loadMonitors()
    }

    async function viewDetails(id) {
      const item = monitorsCache.find((m) => m.id === id)
      if (!item) return
      selectedMonitorId = id

      const [statsRes, checksRes] = await Promise.all([
        authFetch(`/api/admin/stats?monitor_id=${id}`),
        authFetch(`/api/admin/checks?monitor_id=${id}`)
      ])

      const stats = await statsRes.json().catch(() => ({}))
      const checks = await checksRes.json().catch(() => [])

      const uptimeValue = Number(stats.uptime_percentage || 0)
      const latencyValue = Number(stats.average_response_time || 0)
      const uptimeDisplay = Number.isFinite(uptimeValue) ? uptimeValue.toFixed(2) : '0.00'
      const latencyDisplay = Number.isFinite(latencyValue) ? latencyValue.toFixed(0) : '0'

      document.getElementById('detail-box').innerHTML = `
        <div class="detail-grid">
          <div class="detail-meta-list">
            <div><strong>${t('monitor')}:</strong> ${escapeHtml(item.name)}</div>
            <div><strong>${t('url')}:</strong> ${escapeHtml(item.url)}</div>
            <div><strong>${t('thType')}:</strong> ${escapeHtml(item.check_type)}</div>
            <div><strong>${t('thInterval')}:</strong> ${escapeHtml(monitorIntervalLabel(item))}</div>
            <div><strong>${t('thPublic')}:</strong> ${item.is_public ? t('yes') : t('no')}</div>
            <div><strong>${t('thActive')}:</strong> ${item.is_active ? t('yes') : t('no')}</div>
          </div>
          <div class="detail-kpis">
            <div class="kpi-pill">
              <span class="kpi-label">${t('totalChecks')}</span>
              <span class="kpi-value">${escapeHtml(stats.total_checks || 0)}</span>
            </div>
            <div class="kpi-pill ${uptimeLevel(uptimeValue)}">
              <span class="kpi-label">${t('uptime')}</span>
              <span class="kpi-value">${escapeHtml(uptimeDisplay)}%</span>
            </div>
            <div class="kpi-pill ${latencyLevel(latencyValue)}">
              <span class="kpi-label">${t('avgLatency')}</span>
              <span class="kpi-value">${escapeHtml(latencyDisplay)} ms</span>
            </div>
          </div>
        </div>
      `

      const detailActions = document.getElementById('detail-actions')
      detailActions.innerHTML = `
        <button class="js-detail-action" data-action="check-now" data-id="${escapeAttr(item.id)}">${t('checkNow')}</button>
        <button class="secondary js-detail-action" data-action="edit" data-id="${escapeAttr(item.id)}">${t('edit')}</button>
        <button class="secondary js-detail-action" data-action="test-webhook" data-id="${escapeAttr(item.id)}">${t('testWebhook')}</button>
        <button class="danger js-detail-action" data-action="remove" data-id="${escapeAttr(item.id)}">${t('remove')}</button>
      `

      detailActions.querySelectorAll('.js-detail-action').forEach((button) => {
        button.addEventListener('click', () => {
          const action = button.getAttribute('data-action')
          const monitorId = button.getAttribute('data-id')
          if (!monitorId) return
          if (action === 'check-now') return checkNow(monitorId)
          if (action === 'edit') return editMonitor(monitorId)
          if (action === 'test-webhook') return testWebhook(monitorId)
          if (action === 'remove') return removeMonitor(monitorId)
        })
      })

      const topChecks = Array.isArray(checks) ? checks.slice(0, 10) : []
      document.getElementById('checks-box').innerHTML = topChecks.length ? `
        <h4>${t('latest10')}</h4>
        <table>
          <thead><tr><th>${t('time')}</th><th>${t('status')}</th><th>${t('latency')}</th><th>${t('statusCode')}</th><th>${t('error')}</th></tr></thead>
          <tbody>
            ${topChecks.map((c) => `<tr>
              <td>${escapeHtml(new Date(c.checked_at).toLocaleString())}</td>
              <td>${escapeHtml(c.status)}</td>
              <td>${escapeHtml(c.response_time)} ms</td>
              <td>${escapeHtml(c.status_code)}</td>
              <td>${escapeHtml(c.error_message || '-')}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      ` : `<p>${t('noChecks')}</p>`
    }

    async function loadSystemConfig() {
      const res = await authFetch('/api/admin/config')
      const data = await res.json().catch(() => ({}))
      if (!res.ok) {
        alert(data.error || t('loadConfigFailed'))
        return
      }

      const cfg = data.config || {}
      document.getElementById('config-file').textContent = `${t('cfgFilePrefix')}: ${data.file || '-'}`
      document.getElementById('cfg_port').value = cfg.server?.port ?? 3000
      document.getElementById('cfg_db_path').value = cfg.database?.path ?? './data/monitor.db'
      document.getElementById('cfg_jwt').value = cfg.auth?.jwtSecret ?? ''
      document.getElementById('cfg_admin_init').value = cfg.database?.initialAdminPassword ?? ''
      document.getElementById('cfg_concurrency').value = cfg.monitoring?.maxConcurrentChecks ?? 5
      document.getElementById('cfg_default_timeout').value = cfg.monitoring?.defaultTimeoutSeconds ?? 30
      document.getElementById('cfg_binary_path').value = cfg.binary?.path ?? '/app'
      document.getElementById('cfg_binary_port').value = cfg.binary?.targetPort ?? 31000
      document.getElementById('cfg_binary_url').value = cfg.binary?.url ?? ''
      document.getElementById('cfg_binary_autostart').value = cfg.binary?.autoStart ? '1' : '0'
      await loadBinaryStatus()
    }

    function renderBinaryStatus(status) {
      const box = document.getElementById('cfg-binary-status')
      if (!status) {
        box.textContent = '-'
        return
      }
      const state = status.running ? t('cfgBinaryRunning') : t('cfgBinaryStopped')
      const binaryUrl = status.config?.url || '-'
      const pathPrefix = status.config?.path || '/app'
      const targetPort = status.config?.targetPort || 31000
      const pid = status.pid || '-'
      const err = status.lastError ? ` | error=${status.lastError}` : ''
      box.textContent = `${state} | url=${binaryUrl} | ${pathPrefix} -> 127.0.0.1:${targetPort} | pid=${pid}${err}`
    }

    async function loadBinaryStatus() {
      const res = await authFetch('/api/admin/binary/status')
      const data = await res.json().catch(() => ({}))
      if (!res.ok) {
        renderBinaryStatus(null)
        return
      }
      renderBinaryStatus(data)
    }

    document.getElementById('config-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const payload = {
        server: { port: Number(document.getElementById('cfg_port').value) },
        database: {
          path: document.getElementById('cfg_db_path').value.trim(),
          initialAdminPassword: document.getElementById('cfg_admin_init').value
        },
        auth: { jwtSecret: document.getElementById('cfg_jwt').value },
        monitoring: {
          maxConcurrentChecks: Number(document.getElementById('cfg_concurrency').value),
          defaultTimeoutSeconds: Number(document.getElementById('cfg_default_timeout').value)
        },
        binary: {
          url: document.getElementById('cfg_binary_url').value.trim(),
          path: document.getElementById('cfg_binary_path').value.trim(),
          targetPort: Number(document.getElementById('cfg_binary_port').value),
          autoStart: document.getElementById('cfg_binary_autostart').value === '1'
        }
      }

      const res = await authFetch('/api/admin/config', {
        method: 'PUT',
        body: JSON.stringify(payload)
      })
      const data = await res.json().catch(() => ({}))
      if (!res.ok) {
        alert(data.error || t('saveConfigFailed'))
        return
      }

      alert(t('configSaved'))
      closeConfigModal()
      await loadSystemConfig()
    })

    document.getElementById('cfg-binary-status-btn').addEventListener('click', async () => {
      await loadBinaryStatus()
    })

    document.getElementById('cfg-binary-start-btn').addEventListener('click', async () => {
      const payload = {
        url: document.getElementById('cfg_binary_url').value.trim(),
        path: document.getElementById('cfg_binary_path').value.trim(),
        targetPort: Number(document.getElementById('cfg_binary_port').value),
        autoStart: document.getElementById('cfg_binary_autostart').value === '1'
      }
      const res = await authFetch('/api/admin/binary/start', {
        method: 'POST',
        body: JSON.stringify(payload)
      })
      const data = await res.json().catch(() => ({}))
      if (!res.ok) {
        alert(data.error || t('saveConfigFailed'))
        return
      }
      renderBinaryStatus(data.status)
    })

    document.getElementById('cfg-binary-stop-btn').addEventListener('click', async () => {
      const res = await authFetch('/api/admin/binary/stop', { method: 'POST' })
      const data = await res.json().catch(() => ({}))
      if (!res.ok) {
        alert(data.error || t('saveConfigFailed'))
        return
      }
      renderBinaryStatus(data.status)
    })

    document.getElementById('monitor-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const payload = readFormPayload()
      if (payload.check_interval_mode === 'range' && payload.check_interval_min > payload.check_interval_max) {
        alert(t('badRange'))
        return
      }

      const url = editingId ? `/api/admin/monitors/${editingId}` : '/api/admin/monitors'
      const method = editingId ? 'PUT' : 'POST'

      const res = await authFetch(url, {
        method,
        body: JSON.stringify(payload)
      })
      const data = await res.json().catch(() => ({}))
      if (!res.ok) {
        alert(data.error || t('saveFailed'))
        return
      }

      if (data?.id) {
        selectedMonitorId = data.id
      }
      resetForm()
      closeMonitorModal()
      await loadMonitors()
    })

    document.getElementById('open-create-modal-btn').addEventListener('click', startCreateMonitor)
    document.getElementById('open-config-modal-btn').addEventListener('click', openConfigModal)
    document.getElementById('open-password-modal-btn').addEventListener('click', openPasswordModal)
    document.getElementById('close-monitor-modal-btn').addEventListener('click', closeMonitorModal)
    document.getElementById('close-monitor-modal-mask').addEventListener('click', closeMonitorModal)
    document.getElementById('close-config-modal-btn').addEventListener('click', closeConfigModal)
    document.getElementById('close-config-modal-mask').addEventListener('click', closeConfigModal)
    document.getElementById('close-password-modal-btn').addEventListener('click', closePasswordModal)
    document.getElementById('close-password-modal-mask').addEventListener('click', closePasswordModal)
    document.getElementById('cancel-edit-btn').addEventListener('click', () => {
      resetForm()
      closeMonitorModal()
    })
    document.getElementById('check_interval_mode').addEventListener('change', applyIntervalModeUI)
    document.getElementById('toggle-advanced').addEventListener('change', (e) => {
      document.getElementById('advanced-fields').style.display = e.target.checked ? '' : 'none'
    })
    document.getElementById('enable-webhook').addEventListener('change', (e) => {
      document.getElementById('webhook-fields').style.display = e.target.checked ? '' : 'none'
    })

    document.getElementById('pwd-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const newPassword = document.getElementById('new_password').value
      if (!newPassword || newPassword.length < 6) {
        alert(t('newPwdTooShort'))
        return
      }

      const res = await authFetch('/api/auth/change-password', {
        method: 'POST',
        body: JSON.stringify({ new_password: newPassword })
      })
      const data = await res.json().catch(() => ({}))
      if (!res.ok) {
        alert(data.error || t('pwdChangeFailed'))
        return
      }

      alert(t('pwdChanged'))
      localStorage.removeItem('admin_token')
      location.href = '/login'
    })

    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('admin_token')
      location.href = '/login'
    })

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        closeAllModals()
      }
    })

    applyI18n()
    resetForm()
    loadMonitors()
    loadSystemConfig()
  </script>
</body>
</html>
